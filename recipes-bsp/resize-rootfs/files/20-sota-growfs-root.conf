[Unit]
# The ostree deployment root "/" is not backed by a block device (a composefs
# overlay, or a bind mount of the deployment directory); the growable
# filesystem is the physical root mounted at /sysroot, which also backs /var.
After=sysroot.mount
# /etc is transient on composefs images, so the base "systemctl disable" does
# not persist across reboots; latch run-once behavior with a stamp in /var,
# which survives reboots and OTA updates but is reset by reflashing.
ConditionPathExists=!/var/lib/resize-rootfs/growfs-done

[Service]
StateDirectory=resize-rootfs
ExecStart=
ExecStart=/usr/lib/systemd/systemd-growfs /sysroot
ExecStartPost=
ExecStartPost=/bin/touch /var/lib/resize-rootfs/growfs-done
